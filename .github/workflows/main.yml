name: Build APK with Buildozer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Pre-install critical dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libunwind-dev libtool

    - name: Install Ubuntu Dependencies
      run: |
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          gstreamer1.0-libav \
          libffi-dev \
          libssl-dev \
          libgtk-3-dev \
          autoconf \
          automake \
          pkg-config \
          ccache \
          clang

    - name: Install Buildozer and Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade "buildozer>=1.5.0" cython virtualenv

    - name: Build with Buildozer
      run: |
        export ACLOCAL_PATH=/usr/share/aclocal
        export PATH=$PATH:/usr/bin
        
        # 'debug' o'rniga 'release' ishlatilmoqda
        yes | buildozer android debug
      env:
        BUILDOZER_ALLOW_SDK_DOWNLOAD: 1

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: package-apk
        path: bin/*.apk
