name: Build APK with Buildozer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libunwind-dev \
          libtool \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          gstreamer1.0-libav \
          libffi-dev \
          libssl-dev \
          libgtk-3-dev \
          autoconf \
          automake \
          pkg-config \
          ccache \
          clang \
          libclang-dev \
          lld \
          ninja-build \
          wget \
          curl \
          ant \
          ca-certificates

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade "buildozer>=1.5.0" cython virtualenv pycryptodome

    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug 2>&1 | tee build.log
      env:
        BUILDOZER_ALLOW_SDK_DOWNLOAD: 1
        BUILDOZER_LOG_LEVEL: 2
        CC: clang
        CXX: clang++
        LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu:/usr/local/lib
        LDFLAGS: -L/usr/lib/x86_64-linux-gnu -L/usr/local/lib
        CPPFLAGS: -I/usr/include -I/usr/local/include

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: soat-app-debug
        path: bin/*.apk
        retention-days: 30

    - name: Show build error details
      if: failure()
      run: |
        echo "=== Build Log ==="
        tail -200 build.log || true
        echo ""
        echo "=== FreeType Config Log ==="
        find .buildozer -name "config.log" -type f -exec tail -100 {} \; 2>/dev/null || echo "Config log not found"
