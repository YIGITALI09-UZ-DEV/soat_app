name: Build APK with Buildozer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Update package manager
      run: |
        sudo apt-get update
        sudo apt-get upgrade -y

    - name: Install system dependencies
      run: |
        sudo apt-get install -y \
          build-essential \
          git \
          ffmpeg \
          libunwind-dev \
          libtool \
          libsdl2-dev \
          libsdl2-image-dev \
          libsdl2-mixer-dev \
          libsdl2-ttf-dev \
          libportmidi-dev \
          libswscale-dev \
          libavformat-dev \
          libavcodec-dev \
          zlib1g-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good \
          gstreamer1.0-libav \
          libffi-dev \
          libssl-dev \
          libgtk-3-dev \
          autoconf \
          automake \
          pkg-config \
          ccache \
          clang \
          libclang-dev \
          lld \
          ninja-build \
          wget \
          curl \
          ant

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install --upgrade "buildozer>=1.5.0" cython virtualenv pycryptodome

    - name: Setup environment variables
      run: |
        echo "ACLOCAL_PATH=/usr/share/aclocal" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> $GITHUB_ENV
        echo "LDFLAGS=-L/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
        echo "CPPFLAGS=-I/usr/include" >> $GITHUB_ENV
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug
      env:
        BUILDOZER_ALLOW_SDK_DOWNLOAD: 1
        BUILDOZER_LOG_LEVEL: 2

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: soat-app-debug
        path: bin/*.apk
        retention-days: 30

    - name: Show build logs on failure
      if: failure()
      run: |
        if [ -f ".buildozer/android/platform/build-arm64-v8a/build/other_builds/freetype/arm64-v8a__ndk_target_28/freetype/config.log" ]; then
          tail -100 ".buildozer/android/platform/build-arm64-v8a/build/other_builds/freetype/arm64-v8a__ndk_target_28/freetype/config.log"
        fi
